<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LawnBot Tycoon — Idle Robotic Lawn Empire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg-0: #0a1f12;
    --bg-1: #0f2a17;
    --bg-2: #143a1f;
    --grass-dark: #1e5d2c;
    --grass-mid: #2d8a3f;
    --grass-light: #58c85f;
    --grass-xlight: #8ff09e;
    --gold: #ffd34e;
    --gold-glow: #ffba1a;
    --gem: #72f2ff;
    --gem-glow: #3bd4ff;
    --ink: #e9fbe7;
    --ink-dim: #9fc4a2;
    --panel: rgba(10, 28, 18, 0.82);
    --panel-b: rgba(104, 224, 131, 0.28);
    --btn: linear-gradient(180deg, #2ea04a 0%, #1b6c31 100%);
    --btn-hover: linear-gradient(180deg, #3fc15d 0%, #22823b 100%);
    --btn-disabled: linear-gradient(180deg, #33463a 0%, #1a2b21 100%);
    --danger: linear-gradient(180deg, #d83a3a 0%, #7a1e1e 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 700px at 20% -10%, #1a5230 0%, transparent 55%),
      radial-gradient(900px 600px at 120% 110%, #143a1f 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 60%, var(--bg-0) 100%);
    user-select: none;
    -webkit-user-select: none;
  }
  button { font-family: inherit; color: inherit; cursor: pointer; }

  /* ---------- Layout ---------- */
  #app {
    position: fixed; inset: 0;
    display: grid;
    grid-template-rows: 64px 1fr 44px;
    grid-template-columns: 1fr 380px;
    grid-template-areas:
      "header header"
      "stage  shop"
      "footer footer";
    gap: 12px;
    padding: 12px;
  }
  header.top {
    grid-area: header;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px;
    background: var(--panel);
    border: 1px solid var(--panel-b);
    border-radius: 14px;
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .title {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--grass-xlight);
    text-shadow:
      0 0 12px rgba(143, 240, 158, 0.55),
      0 2px 0 #082a11,
      0 4px 0 #061e0c;
  }
  .title .emoji { filter: drop-shadow(0 0 8px rgba(143, 240, 158, 0.5)); }
  .currencies { display: flex; gap: 14px; align-items: center; }
  .currency {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border-radius: 10px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.06);
    min-width: 170px;
    justify-content: flex-end;
  }
  .currency .ico { font-size: 22px; line-height: 1; filter: drop-shadow(0 0 6px rgba(255,215,64,0.55)); }
  .currency.gem .ico { filter: drop-shadow(0 0 6px rgba(114,242,255,0.55)); }
  .currency .amt { font-weight: 900; font-variant-numeric: tabular-nums; font-size: 18px; }
  .currency.gem .amt { color: var(--gem); }
  .currency.coin .amt { color: var(--gold); text-shadow: 0 0 10px rgba(255,211,78,0.35); }
  .currency .rate { color: var(--ink-dim); font-size: 12px; }

  main.stage {
    grid-area: stage;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--panel-b);
    background:
      radial-gradient(ellipse at 30% 20%, #1f6a34 0%, #113d1d 60%, #0a2612 100%);
    box-shadow: inset 0 0 80px rgba(0,0,0,0.45), 0 10px 30px rgba(0,0,0,0.35);
  }
  canvas#lawn {
    display: block; width: 100%; height: 100%;
    image-rendering: pixelated;
  }
  .stage-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.45) 100%);
  }

  .stage-hud {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; gap: 10px;
    pointer-events: none;
  }
  .hud-pill {
    background: rgba(5,15,10,0.7);
    border: 1px solid rgba(143,240,158,0.22);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px; color: var(--ink-dim);
    backdrop-filter: blur(4px);
  }
  .hud-pill b { color: var(--ink); font-weight: 700; }

  aside.shop {
    grid-area: shop;
    background: var(--panel);
    border: 1px solid var(--panel-b);
    border-radius: 16px;
    padding: 14px 10px 14px 14px;
    display: flex; flex-direction: column;
    min-height: 0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }
  .shop h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--grass-xlight);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .tabs {
    display: flex; gap: 6px; margin-bottom: 10px;
  }
  .tab {
    flex: 1;
    border: 1px solid rgba(143,240,158,0.2);
    background: rgba(0,0,0,0.3);
    color: var(--ink-dim);
    padding: 8px;
    border-radius: 8px;
    font-weight: 600; font-size: 13px;
    transition: all .15s;
  }
  .tab.active { background: rgba(88,200,95,0.2); color: var(--ink); border-color: rgba(143,240,158,0.5); }
  .tab:hover { color: var(--ink); }

  .upgrades { overflow-y: auto; padding-right: 6px; flex: 1; scrollbar-width: thin; scrollbar-color: #2d8a3f transparent; }
  .upgrades::-webkit-scrollbar { width: 8px; }
  .upgrades::-webkit-scrollbar-thumb { background: rgba(143,240,158,0.3); border-radius: 4px; }

  .upgrade {
    background: linear-gradient(180deg, rgba(20,50,30,0.7), rgba(10,28,18,0.7));
    border: 1px solid rgba(143,240,158,0.18);
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 42px 1fr auto;
    gap: 10px;
    align-items: center;
    transition: border-color .15s, transform .1s;
  }
  .upgrade:hover { border-color: rgba(143,240,158,0.4); }
  .upgrade.affordable { border-color: rgba(255,211,78,0.45); box-shadow: 0 0 0 1px rgba(255,211,78,0.15), 0 0 16px rgba(255,211,78,0.08); }
  .upgrade .icon {
    font-size: 28px; text-align: center;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
  }
  .upgrade .info { min-width: 0; }
  .upgrade .name { font-weight: 700; font-size: 14px; }
  .upgrade .lvl { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .upgrade .effect { color: var(--grass-xlight); font-size: 12px; margin-top: 2px; }
  .upgrade .buy {
    border: 0;
    border-radius: 10px;
    padding: 8px 12px;
    background: var(--btn);
    color: white;
    font-weight: 800; font-size: 13px;
    min-width: 86px;
    transition: transform .08s, filter .1s;
    box-shadow: 0 2px 0 #0a2612, 0 4px 10px rgba(0,0,0,0.4);
  }
  .upgrade .buy:hover:not(:disabled) { background: var(--btn-hover); }
  .upgrade .buy:active { transform: translateY(1px); }
  .upgrade .buy:disabled { background: var(--btn-disabled); color: var(--ink-dim); cursor: not-allowed; box-shadow: none; }
  .upgrade .buy .cost { display: block; font-size: 11px; font-weight: 600; opacity: 0.95; }

  .prestige {
    background: linear-gradient(180deg, rgba(60, 20, 90, 0.6), rgba(20, 10, 40, 0.7));
    border: 1px solid rgba(114, 242, 255, 0.35);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    margin-bottom: 10px;
  }
  .prestige h3 {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px; letter-spacing: 1px;
    color: var(--gem);
    margin-bottom: 6px;
    text-shadow: 0 0 10px rgba(114,242,255,0.5);
  }
  .prestige p { font-size: 12px; color: var(--ink-dim); margin-bottom: 10px; }
  .prestige .gain { color: var(--gem); font-weight: 800; font-size: 18px; text-shadow: 0 0 10px rgba(114,242,255,0.4); }
  .prestige button {
    border: 0; border-radius: 10px;
    padding: 10px 14px;
    background: linear-gradient(180deg, #3bd4ff, #117fbf);
    color: white; font-weight: 800; width: 100%;
    box-shadow: 0 4px 14px rgba(59,212,255,0.35);
  }
  .prestige button:disabled { background: var(--btn-disabled); color: var(--ink-dim); cursor: not-allowed; box-shadow: none; }

  footer.bottom {
    grid-area: footer;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px;
    background: var(--panel);
    border: 1px solid var(--panel-b);
    border-radius: 10px;
    font-size: 12px; color: var(--ink-dim);
  }
  footer .actions { display: flex; gap: 8px; }
  footer button {
    border: 1px solid rgba(143,240,158,0.2);
    background: rgba(0,0,0,0.3);
    color: var(--ink);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px; font-weight: 600;
    transition: all .1s;
  }
  footer button:hover { background: rgba(88,200,95,0.15); border-color: rgba(143,240,158,0.45); }
  footer button.danger:hover { background: rgba(216,58,58,0.2); border-color: rgba(216,58,58,0.45); }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(6px);
    animation: fadeIn .2s ease-out;
  }
  .modal {
    background: linear-gradient(180deg, #14351e 0%, #0a1f12 100%);
    border: 1px solid rgba(143,240,158,0.35);
    border-radius: 16px;
    padding: 28px;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(88,200,95,0.2);
    animation: modalIn .3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
  }
  .modal h2 {
    font-family: 'Press Start 2P', monospace;
    color: var(--grass-xlight);
    margin-bottom: 12px;
    font-size: 14px;
  }
  .modal p { color: var(--ink-dim); margin-bottom: 16px; line-height: 1.5; }
  .modal .big {
    font-size: 32px; font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 16px rgba(255,211,78,0.5);
    margin: 12px 0;
  }
  .modal button {
    border: 0; border-radius: 10px;
    padding: 12px 24px;
    background: var(--btn);
    color: white; font-weight: 800; font-size: 14px;
    min-width: 140px;
    box-shadow: 0 4px 0 #0a2612;
  }
  .modal button:hover { background: var(--btn-hover); }

  /* ---------- Toasts / Achievements ---------- */
  #toasts {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
    z-index: 50;
  }
  .toast {
    background: linear-gradient(180deg, rgba(255,211,78,0.95), rgba(255,186,26,0.95));
    color: #2a1800;
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: 800; font-size: 13px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 0 20px rgba(255,186,26,0.4);
    animation: toastIn .4s cubic-bezier(0.18, 0.89, 0.32, 1.28), toastOut .4s ease-in 2.6s forwards;
    display: flex; align-items: center; gap: 8px;
  }
  .toast .t-ico { font-size: 18px; }

  /* ---------- Animations ---------- */
  @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
  @keyframes modalIn { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes toastIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes toastOut { to { transform: translateY(-30px); opacity: 0; } }
  @keyframes coinPop { from { transform: scale(1.2); } to { transform: scale(1); } }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,211,78,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(255,211,78,0); }
  }
  .currency.coin.pulse .amt { animation: coinPop .25s ease-out; }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px) {
    #app {
      grid-template-rows: auto 1fr auto 40px;
      grid-template-columns: 1fr;
      grid-template-areas:
        "header"
        "stage"
        "shop"
        "footer";
    }
    aside.shop { max-height: 50vh; }
    .title { font-size: 12px; }
    .currency { min-width: 120px; padding: 6px 10px; }
  }
</style>
</head>
<body>
  <div id="app">
    <header class="top">
      <div class="title">
        <span class="emoji">🤖</span>&nbsp; LAWNBOT TYCOON
      </div>
      <div class="currencies">
        <div class="currency coin" id="coinBox">
          <span class="ico">💰</span>
          <div style="display:flex; flex-direction:column; align-items:flex-end;">
            <span class="amt" id="coinAmt">0</span>
            <span class="rate" id="coinRate">+0 / sec</span>
          </div>
        </div>
        <div class="currency gem" id="gemBox">
          <span class="ico">💎</span>
          <div style="display:flex; flex-direction:column; align-items:flex-end;">
            <span class="amt" id="gemAmt">0</span>
            <span class="rate" id="gemBonus">+0% bonus</span>
          </div>
        </div>
      </div>
    </header>

    <main class="stage">
      <canvas id="lawn"></canvas>
      <div class="stage-overlay"></div>
      <div class="stage-hud">
        <div class="hud-pill">🤖 Robots: <b id="hudRobots">1</b></div>
        <div class="hud-pill">🌱 Lawn Growth: <b id="hudGrass">0%</b></div>
        <div class="hud-pill">🌸 Flowers: <b id="hudFlowers">0</b></div>
        <div class="hud-pill">🐝 Bees: <b id="hudBees">0</b></div>
        <div class="hud-pill">🏆 Total Mowed: <b id="hudTotal">0</b></div>
      </div>
    </main>

    <aside class="shop">
      <h2>⚙️ UPGRADE SHOP</h2>
      <div class="tabs">
        <button class="tab active" data-tab="upgrades">Upgrades</button>
        <button class="tab" data-tab="garden">🌻 Garden</button>
        <button class="tab" data-tab="prestige">Fertilize</button>
      </div>
      <div class="upgrades" id="shopList"></div>
    </aside>

    <footer class="bottom">
      <span id="saveStatus">💾 Auto-saving…</span>
      <div class="actions">
        <button id="muteBtn">🔊 Sound</button>
        <button id="saveBtn">Save Now</button>
        <button id="resetBtn" class="danger">Reset</button>
      </div>
    </footer>
  </div>

  <div id="toasts"></div>

<script>
/* ============================================================
   LAWNBOT TYCOON — single-file idle game
   ============================================================ */

// ---------- Config ----------
const CFG = {
  gridW: 48,
  gridH: 30,
  growthRateBase: 0.013,
  mowSpeedBase: 90,
  mowRadiusBase: 14,
  mowRateBase: 1.6,
  coinPerUnitBase: 1.0,
  targetRecheck: 0.35,
  maxParticles: 260,
  prestigeThreshold: 10000,
  prestigeFormula: (totalThisRun) => Math.floor(Math.pow(totalThisRun / 2500, 0.55)),
  beePerHive: 3,
  beeSpeed: 80,
  flowerCoinPerSec: 0.35,
  beeRewardPerVisit: 2.2,
  beeVisitDuration: 0.55,
};

// Tile types
const T = {
  GRASS: 0, TREE: 1, ROCK: 2, POND: 3, FLOWER: 4,
  BEEHIVE: 5, FOUNTAIN: 6, SHED: 7, GNOME: 8,
};
const OBSTACLE = new Set([T.TREE, T.ROCK, T.POND, T.FLOWER, T.BEEHIVE, T.FOUNTAIN, T.SHED, T.GNOME]);

// ---------- State ----------
let state = {
  coins: 0,
  gems: 0,
  totalEarnedAllTime: 0,
  totalEarnedThisRun: 0,
  totalTilesMowed: 0,
  lastUpdate: Date.now(),
  muted: false,
  upgrades: {
    robots: 1, speed: 0, range: 0, value: 0, growth: 0, rate: 0, crit: 0,
  },
  garden: {
    tree: 0, rock: 0, pond: 0, flower: 0, beehive: 0, fountain: 0, shed: 0, gnome: 0,
  },
};
const COST = {
  robots:  (n) => Math.ceil(25   * Math.pow(1.45, n - 1)),
  speed:   (n) => Math.ceil(40   * Math.pow(1.35, n)),
  range:   (n) => Math.ceil(60   * Math.pow(1.40, n)),
  value:   (n) => Math.ceil(80   * Math.pow(1.42, n)),
  growth:  (n) => Math.ceil(120  * Math.pow(1.45, n)),
  rate:    (n) => Math.ceil(150  * Math.pow(1.40, n)),
  crit:    (n) => Math.ceil(500  * Math.pow(1.55, n)),
};
const MAX = {
  robots: 50, speed: 120, range: 60, value: 120, growth: 80, rate: 80, crit: 40,
};

// Garden (placeable items)
const GARDEN_DEFS = [
  { key: 'flower',   type: T.FLOWER,   icon: '🌸', name: 'Flower Bed',
    desc: () => `+${CFG.flowerCoinPerSec} coins/sec each; attracts bees`,
    baseCost: 150,  mult: 1.28, max: 80 },
  { key: 'tree',     type: T.TREE,     icon: '🌳', name: 'Shade Tree',
    desc: () => `+1% grass growth each (shade retains moisture)`,
    baseCost: 500,  mult: 1.40, max: 40 },
  { key: 'rock',     type: T.ROCK,     icon: '🪨', name: 'Garden Rock',
    desc: () => `+0.5% coin value each (hidden treasure!)`,
    baseCost: 250,  mult: 1.32, max: 40 },
  { key: 'pond',     type: T.POND,     icon: '💧', name: 'Koi Pond',
    desc: () => `+3% grass growth each (dew everywhere)`,
    baseCost: 3000, mult: 1.60, max: 10 },
  { key: 'beehive',  type: T.BEEHIVE,  icon: '🐝', name: 'Beehive',
    desc: () => `Spawns ${CFG.beePerHive} bees; each pollination = coins`,
    baseCost: 3000, mult: 1.60, max: 12 },
  { key: 'fountain', type: T.FOUNTAIN, icon: '⛲', name: 'Fountain',
    desc: () => `+8% global coin income each (opulence boost)`,
    baseCost: 10000,mult: 1.75, max: 10 },
  { key: 'shed',     type: T.SHED,     icon: '🏚️', name: 'Garden Shed',
    desc: () => `+5% robot speed each (tune-ups!)`,
    baseCost: 4000, mult: 1.55, max: 15 },
  { key: 'gnome',    type: T.GNOME,    icon: '🧙', name: 'Garden Gnome',
    desc: () => `+1% crit chance each (mischievous luck)`,
    baseCost: 1800, mult: 1.50, max: 20 },
];
const GARDEN_BY_KEY = Object.fromEntries(GARDEN_DEFS.map(d => [d.key, d]));
function gardenCost(key) {
  const def = GARDEN_BY_KEY[key];
  return Math.ceil(def.baseCost * Math.pow(def.mult, state.garden[key]));
}

// ---------- Derived values ----------
function gemMult()     { return 1 + state.gems * 0.10; }
function shedMult()    { return 1 + state.garden.shed * 0.05; }
function fountainMult(){ return 1 + state.garden.fountain * 0.08; }
function rockMult()    { return 1 + state.garden.rock * 0.005; }
function treeGrowth()  { return state.garden.tree * 0.01 + state.garden.pond * 0.03; }
function gnomeCritBonus(){ return state.garden.gnome * 0.01; }

function robotSpeed()  { return CFG.mowSpeedBase * (1 + state.upgrades.speed * 0.10) * shedMult(); }
function mowRadius()   { return CFG.mowRadiusBase * (1 + state.upgrades.range * 0.08); }
function coinMult()    { return (1 + state.upgrades.value * 0.15) * gemMult() * fountainMult() * rockMult(); }
function growthRate()  { return CFG.growthRateBase * (1 + state.upgrades.growth * 0.12 + treeGrowth()); }
function mowRate()     { return CFG.mowRateBase * (1 + state.upgrades.rate * 0.15); }
function critChance()  { return Math.min(0.75, state.upgrades.crit * 0.02 + gnomeCritBonus()); }
function critMult()    { return 5; }

// ---------- World Grid ----------
let grass;        // Float32Array (height 0..1)
let tiles;        // Uint8Array (tile type, values from T.*)
let flowerColors; // Uint8Array (index into FLOWER_PALETTE per flower tile)
const FLOWER_PALETTE = [
  ['#ff7fb4', '#ffe24b'], // pink+yellow center
  ['#ffd447', '#ff7a1f'], // sunflower
  ['#b07bff', '#ffffff'], // lilac
  ['#ff3f56', '#ffe45a'], // poppy
  ['#ffffff', '#ffe24b'], // daisy
  ['#ff9f1c', '#fff1cf'], // marigold
];

function idx(x, y) { return y * CFG.gridW + x; }
function inBounds(x, y) { return x >= 0 && y >= 0 && x < CFG.gridW && y < CFG.gridH; }

function initWorld() {
  grass = new Float32Array(CFG.gridW * CFG.gridH);
  tiles = new Uint8Array(CFG.gridW * CFG.gridH);
  flowerColors = new Uint8Array(CFG.gridW * CFG.gridH);
  for (let i = 0; i < grass.length; i++) grass[i] = 0.7 + Math.random() * 0.3;

  // scatter initial scenery for visual richness (purely cosmetic, no gameplay bonus)
  const treeCount = 8 + Math.floor(Math.random() * 4);
  const rockCount = 6 + Math.floor(Math.random() * 4);
  for (let i = 0; i < treeCount; i++) placeAtRandomGrass(T.TREE);
  for (let i = 0; i < rockCount; i++) placeAtRandomGrass(T.ROCK);
  // one starter pond near edge
  placePondBlob();
}

function placeAtRandomGrass(type, triesMax = 40) {
  for (let i = 0; i < triesMax; i++) {
    const x = 1 + Math.floor(Math.random() * (CFG.gridW - 2));
    const y = 1 + Math.floor(Math.random() * (CFG.gridH - 2));
    if (tiles[idx(x, y)] !== T.GRASS) continue;
    if (tileNearRobot(x, y)) continue;
    tiles[idx(x, y)] = type;
    grass[idx(x, y)] = 0;
    if (type === T.FLOWER) {
      flowerColors[idx(x, y)] = Math.floor(Math.random() * FLOWER_PALETTE.length);
    }
    return { x, y };
  }
  return null;
}

function placePondBlob() {
  const cx = 2 + Math.floor(Math.random() * (CFG.gridW - 4));
  const cy = 2 + Math.floor(Math.random() * (CFG.gridH - 4));
  const cells = [[cx, cy], [cx + 1, cy], [cx, cy + 1], [cx + 1, cy + 1]];
  for (const [x, y] of cells) {
    if (inBounds(x, y) && tiles[idx(x, y)] === T.GRASS) {
      tiles[idx(x, y)] = T.POND;
      grass[idx(x, y)] = 0;
    }
  }
}

function tileNearRobot(tx, ty) {
  if (!robots || robots.length === 0) return false;
  const ts = tileSize || 16;
  const cx = (tx + 0.5) * ts, cy = (ty + 0.5) * ts;
  for (const r of robots) if (Math.hypot(r.x - cx, r.y - cy) < ts * 2) return true;
  return false;
}

// ---------- Robots ----------
let robots = [];

function spawnRobot() {
  const ts = getTileSize();
  // Start on a grass tile (not obstacles)
  let tx = 1, ty = 1;
  for (let i = 0; i < 60; i++) {
    const rx = 1 + Math.floor(Math.random() * (CFG.gridW - 2));
    const ry = 1 + Math.floor(Math.random() * (CFG.gridH - 2));
    if (tiles[idx(rx, ry)] === T.GRASS) { tx = rx; ty = ry; break; }
  }
  robots.push({
    x: (tx + 0.5) * ts,
    y: (ty + 0.5) * ts,
    angle: Math.random() * Math.PI * 2,
    target: null,
    bladePhase: Math.random() * Math.PI * 2,
    lastTargetCheck: 0,
    bob: Math.random() * Math.PI * 2,
  });
}

function ensureRobotCount() {
  while (robots.length < state.upgrades.robots) spawnRobot();
  while (robots.length > state.upgrades.robots) robots.pop();
}

// ---------- Bees ----------
let bees = [];

function spawnBee(homeTileX, homeTileY) {
  const ts = getTileSize();
  bees.push({
    x: (homeTileX + 0.5) * ts,
    y: (homeTileY + 0.5) * ts,
    homeX: homeTileX, homeY: homeTileY,
    angle: Math.random() * Math.PI * 2,
    target: null,
    state: 'flying',
    stateTime: 0,
    wingPhase: Math.random() * 10,
    jitter: Math.random() * 10,
  });
}

function ensureBeesFromHives() {
  // Find hive tile positions
  const hives = [];
  for (let y = 0; y < CFG.gridH; y++)
    for (let x = 0; x < CFG.gridW; x++)
      if (tiles[idx(x, y)] === T.BEEHIVE) hives.push({ x, y });
  const want = hives.length * CFG.beePerHive;
  while (bees.length < want) {
    const h = hives[Math.floor(Math.random() * hives.length)];
    spawnBee(h.x, h.y);
  }
  while (bees.length > want) bees.pop();
}

// ---------- Canvas ----------
const canvas = document.getElementById('lawn');
const ctx = canvas.getContext('2d');
let tileSize = 16;

function getTileSize() { return tileSize; }

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const wPx = rect.width * dpr;
  const hPx = rect.height * dpr;
  const tileW = wPx / CFG.gridW;
  const tileH = hPx / CFG.gridH;
  tileSize = Math.floor(Math.min(tileW, tileH));
  canvas.width = CFG.gridW * tileSize;
  canvas.height = CFG.gridH * tileSize;
}

window.addEventListener('resize', () => {
  const oldTile = tileSize;
  resizeCanvas();
  if (oldTile && oldTile !== tileSize) {
    const scale = tileSize / oldTile;
    robots.forEach(r => { r.x *= scale; r.y *= scale; });
    bees.forEach(b => { b.x *= scale; b.y *= scale; if (b.target) { b.target.x *= scale; b.target.y *= scale; } });
  }
});

// ---------- Particles ----------
const particles = [];
function addParticle(x, y, opts = {}) {
  if (particles.length > CFG.maxParticles) particles.shift();
  particles.push({
    x, y,
    vx: (Math.random() - 0.5) * 40,
    vy: -Math.random() * 60 - 20,
    life: 1.0,
    text: opts.text || '',
    color: opts.color || '#ffd34e',
    size: opts.size || 12,
    gravity: opts.gravity ?? 120,
  });
}

// ---------- Coin floaters (UI pop) ----------
let lastCoinFlash = 0;
function flashCoin() {
  const box = document.getElementById('coinBox');
  const now = performance.now();
  if (now - lastCoinFlash > 120) {
    box.classList.remove('pulse'); void box.offsetWidth; box.classList.add('pulse');
    lastCoinFlash = now;
  }
}

// ---------- Sound (tiny synth) ----------
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { audioCtx = null; }
  }
  return audioCtx;
}
function beep(freq = 440, dur = 0.06, type = 'square', vol = 0.05) {
  if (state.muted) return;
  const ac = ensureAudio(); if (!ac) return;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.value = vol;
  gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  osc.connect(gain).connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime + dur);
}

// ---------- Robot AI ----------
function pickTarget(r) {
  const ts = tileSize;
  const cx = Math.floor(r.x / ts);
  const cy = Math.floor(r.y / ts);
  const searchR = 10;
  let best = null; let bestScore = -Infinity;
  for (let dy = -searchR; dy <= searchR; dy++) {
    for (let dx = -searchR; dx <= searchR; dx++) {
      const x = cx + dx, y = cy + dy;
      if (!inBounds(x, y)) continue;
      if (tiles[idx(x, y)] !== T.GRASS) continue;
      const h = grass[idx(x, y)];
      if (h < 0.2) continue;
      const dist = Math.hypot(dx, dy) + 0.1;
      const score = h * h / dist - Math.random() * 0.05;
      if (score > bestScore) { bestScore = score; best = { x, y }; }
    }
  }
  if (!best) {
    // global scan for tallest grass
    let bh = 0, bi = -1;
    for (let i = 0; i < grass.length; i++) {
      if (tiles[i] !== T.GRASS) continue;
      if (grass[i] > bh) { bh = grass[i]; bi = i; }
    }
    if (bi >= 0) best = { x: bi % CFG.gridW, y: Math.floor(bi / CFG.gridW) };
    else {
      // random wander target
      for (let i = 0; i < 20; i++) {
        const rx = Math.floor(Math.random() * CFG.gridW);
        const ry = Math.floor(Math.random() * CFG.gridH);
        if (tiles[idx(rx, ry)] === T.GRASS) { best = { x: rx, y: ry }; break; }
      }
      if (!best) best = { x: cx, y: cy };
    }
  }
  r.target = best;
  r.lastTargetCheck = 0;
}

function obstacleRepulsion(px, py) {
  // Returns a vector (ax, ay) pushing away from nearby obstacle tiles
  const ts = tileSize;
  const cx = Math.floor(px / ts), cy = Math.floor(py / ts);
  let ax = 0, ay = 0;
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const x = cx + dx, y = cy + dy;
      if (!inBounds(x, y)) {
        // wall repulsion
        const wx = Math.max(0, Math.min(CFG.gridW * ts, px));
        const wy = Math.max(0, Math.min(CFG.gridH * ts, py));
        const dX = px - wx, dY = py - wy;
        const d2 = dX*dX + dY*dY + 1;
        ax += dX / d2 * 500;
        ay += dY / d2 * 500;
        continue;
      }
      if (!OBSTACLE.has(tiles[idx(x, y)])) continue;
      const tcx = (x + 0.5) * ts, tcy = (y + 0.5) * ts;
      const dX = px - tcx, dY = py - tcy;
      const d = Math.hypot(dX, dY) + 0.001;
      if (d > ts * 1.8) continue;
      const strength = Math.pow((ts * 1.8 - d) / (ts * 1.8), 2);
      ax += (dX / d) * strength;
      ay += (dY / d) * strength;
    }
  }
  return { ax, ay };
}

function updateRobot(r, dt) {
  const ts = tileSize;
  if (!r.target) pickTarget(r);
  r.lastTargetCheck += dt;
  if (r.target) {
    const t = tiles[idx(r.target.x, r.target.y)];
    const th = grass[idx(r.target.x, r.target.y)];
    if (t !== T.GRASS || th < 0.1 || r.lastTargetCheck > CFG.targetRecheck) pickTarget(r);
  }
  if (!r.target) return;

  const tx = (r.target.x + 0.5) * ts;
  const ty = (r.target.y + 0.5) * ts;
  const dx = tx - r.x, dy = ty - r.y;
  const dist = Math.hypot(dx, dy);
  const seekX = dx / (dist + 0.001);
  const seekY = dy / (dist + 0.001);

  // Repulsion from obstacles
  const rep = obstacleRepulsion(r.x, r.y);
  const avoidWeight = 2.8;
  let vx = seekX + rep.ax * avoidWeight;
  let vy = seekY + rep.ay * avoidWeight;
  const vmag = Math.hypot(vx, vy) + 0.001;
  vx /= vmag; vy /= vmag;

  // Smooth angle turning toward combined direction
  const desiredAngle = Math.atan2(vy, vx);
  let angDiff = desiredAngle - r.angle;
  while (angDiff > Math.PI) angDiff -= 2 * Math.PI;
  while (angDiff < -Math.PI) angDiff += 2 * Math.PI;
  r.angle += angDiff * Math.min(1, dt * 10);

  const speed = robotSpeed();
  if (dist > 2) {
    const nx = r.x + Math.cos(r.angle) * speed * dt;
    const ny = r.y + Math.sin(r.angle) * speed * dt;
    // Hard collision: don't enter obstacle tiles
    const tnx = Math.floor(nx / ts), tny = Math.floor(ny / ts);
    if (inBounds(tnx, tny) && !OBSTACLE.has(tiles[idx(tnx, tny)])) {
      r.x = nx; r.y = ny;
    } else {
      // try axis-separated motion
      const tnx2 = Math.floor(nx / ts), tny2 = Math.floor(r.y / ts);
      if (inBounds(tnx2, tny2) && !OBSTACLE.has(tiles[idx(tnx2, tny2)])) r.x = nx;
      const tnx3 = Math.floor(r.x / ts), tny3 = Math.floor(ny / ts);
      if (inBounds(tnx3, tny3) && !OBSTACLE.has(tiles[idx(tnx3, tny3)])) r.y = ny;
    }
  }

  r.bladePhase += dt * 25;
  r.bob += dt * 10;

  // Mow
  const rad = mowRadius();
  const rate = mowRate();
  const cellRad = Math.ceil(rad / ts) + 1;
  const ccx = Math.floor(r.x / ts);
  const ccy = Math.floor(r.y / ts);
  let mowedThisTick = 0;
  let critHit = false;
  for (let dy2 = -cellRad; dy2 <= cellRad; dy2++) {
    for (let dx2 = -cellRad; dx2 <= cellRad; dx2++) {
      const gx = ccx + dx2, gy = ccy + dy2;
      if (!inBounds(gx, gy)) continue;
      const k = idx(gx, gy);
      if (tiles[k] !== T.GRASS) continue;
      const tcx = (gx + 0.5) * ts, tcy = (gy + 0.5) * ts;
      const d = Math.hypot(tcx - r.x, tcy - r.y);
      if (d > rad) continue;
      const prev = grass[k];
      if (prev <= 0) continue;
      const cut = Math.min(prev, rate * dt * (1 - d / rad * 0.4));
      grass[k] = Math.max(0, prev - cut);
      mowedThisTick += cut;
      if (prev > 0.9 && grass[k] <= 0.9) state.totalTilesMowed++;
    }
  }
  if (mowedThisTick > 0) {
    let coins = mowedThisTick * CFG.coinPerUnitBase * coinMult();
    if (Math.random() < critChance()) { coins *= critMult(); critHit = true; }
    state.coins += coins;
    state.totalEarnedAllTime += coins;
    state.totalEarnedThisRun += coins;
    if (Math.random() < 0.04 + (critHit ? 0.9 : 0)) {
      addParticle(r.x, r.y - 4, {
        text: (critHit ? 'CRIT! +' : '+') + formatShort(coins),
        color: critHit ? '#ff6bcf' : '#ffd34e',
        size: critHit ? 14 : 11,
      });
    }
  }
}

// ---------- Bee AI ----------
function pickBeeTarget(b) {
  // Collect flower positions
  const flowerIdxs = [];
  for (let i = 0; i < tiles.length; i++) if (tiles[i] === T.FLOWER) flowerIdxs.push(i);
  const ts = tileSize;
  if (flowerIdxs.length === 0) {
    const angle = Math.random() * Math.PI * 2;
    const radius = ts * 1.2 + Math.random() * ts;
    b.target = {
      x: (b.homeX + 0.5) * ts + Math.cos(angle) * radius,
      y: (b.homeY + 0.5) * ts + Math.sin(angle) * radius,
      tx: -1, ty: -1,
    };
    return;
  }
  const pick = flowerIdxs[Math.floor(Math.random() * flowerIdxs.length)];
  const fx = pick % CFG.gridW, fy = Math.floor(pick / CFG.gridW);
  b.target = { x: (fx + 0.5) * ts, y: (fy + 0.5) * ts, tx: fx, ty: fy };
}

function updateBee(b, dt) {
  b.wingPhase += dt * 28;
  b.jitter += dt;
  if (!b.target) pickBeeTarget(b);
  const t = b.target;
  const ts = tileSize;
  if (b.state === 'flying') {
    const jx = Math.sin(b.jitter * 6) * 4;
    const jy = Math.cos(b.jitter * 7) * 4;
    const dx = (t.x + jx) - b.x, dy = (t.y + jy) - b.y;
    const dist = Math.hypot(dx, dy);
    b.angle = Math.atan2(dy, dx);
    if (dist < 4) {
      b.state = 'visiting';
      b.stateTime = 0;
    } else {
      b.x += (dx / dist) * CFG.beeSpeed * dt;
      b.y += (dy / dist) * CFG.beeSpeed * dt;
    }
  } else {
    b.stateTime += dt;
    // tiny hover wiggle
    b.x += Math.sin(b.stateTime * 12) * 0.2;
    b.y += Math.cos(b.stateTime * 14) * 0.15;
    if (b.stateTime > CFG.beeVisitDuration) {
      if (t.tx >= 0 && tiles[idx(t.tx, t.ty)] === T.FLOWER) {
        const coins = CFG.beeRewardPerVisit * coinMult();
        state.coins += coins;
        state.totalEarnedAllTime += coins;
        state.totalEarnedThisRun += coins;
        if (Math.random() < 0.35) addParticle(b.x, b.y - 4, { text: '+' + formatShort(coins), color: '#fff4a8', size: 10 });
        beep(900 + Math.random() * 400, 0.02, 'triangle', 0.015);
      }
      b.state = 'flying';
      pickBeeTarget(b);
    }
  }
}

// ---------- Grass + Flower income ----------
function updateGrass(dt) {
  const rate = growthRate() * dt;
  for (let i = 0; i < grass.length; i++) {
    if (tiles[i] !== T.GRASS) { grass[i] = 0; continue; }
    const h = grass[i];
    if (h < 1.0) grass[i] = Math.min(1.0, h + rate * (1 - h * 0.6));
  }
}

let flowerIncomeAccum = 0;
function updateFlowerIncome(dt) {
  const flowers = state.garden.flower;
  if (flowers <= 0) return;
  const perSec = flowers * CFG.flowerCoinPerSec * coinMult();
  const earned = perSec * dt;
  state.coins += earned;
  state.totalEarnedAllTime += earned;
  state.totalEarnedThisRun += earned;
  flowerIncomeAccum += earned;
  if (flowerIncomeAccum > 5) {
    // occasional visible pop from a random flower
    for (let i = 0; i < tiles.length; i++) {
      if (tiles[i] === T.FLOWER && Math.random() < 0.02) {
        const fx = i % CFG.gridW, fy = Math.floor(i / CFG.gridW);
        const ts = tileSize;
        addParticle((fx + 0.5) * ts, (fy + 0.2) * ts, { text: '+' + formatShort(flowerIncomeAccum), color: '#ffb6ef', size: 10 });
        flowerIncomeAccum = 0;
        break;
      }
    }
    if (flowerIncomeAccum > 20) flowerIncomeAccum = 0;
  }
}

// ---------- Rendering ----------
// Pre-render grass tile gradients via offscreen caches keyed by height buckets
const tileCache = {};
function getTileImage(heightBucket) {
  const key = heightBucket + '_' + tileSize;
  if (tileCache[key]) return tileCache[key];
  const off = document.createElement('canvas');
  off.width = tileSize; off.height = tileSize;
  const c = off.getContext('2d');
  // base color depends on height
  const h = heightBucket / 10;
  const baseR = 30 + h * 24;
  const baseG = 70 + h * 110;
  const baseB = 28 + h * 44;
  c.fillStyle = `rgb(${baseR|0},${baseG|0},${baseB|0})`;
  c.fillRect(0, 0, tileSize, tileSize);
  // grass blades
  if (h > 0.2) {
    const blades = Math.floor(2 + h * 5);
    for (let i = 0; i < blades; i++) {
      const bx = Math.random() * tileSize;
      const bh = (0.2 + Math.random() * 0.8) * h * tileSize * 0.7;
      const bw = 1;
      const gr = c.createLinearGradient(bx, tileSize, bx, tileSize - bh);
      gr.addColorStop(0, `rgba(20,60,25,0.9)`);
      gr.addColorStop(1, `rgba(${140 + h * 50},${220},${120},0.9)`);
      c.fillStyle = gr;
      c.fillRect(bx, tileSize - bh, bw, bh);
    }
  }
  // subtle checkerboard overlay
  c.fillStyle = 'rgba(255,255,255,0.02)';
  c.fillRect(0, 0, tileSize, tileSize / 2);
  tileCache[key] = off;
  return off;
}

function drawGrass() {
  const ts = tileSize;
  for (let y = 0; y < CFG.gridH; y++) {
    for (let x = 0; x < CFG.gridW; x++) {
      const k = idx(x, y);
      if (tiles[k] === T.GRASS) {
        const h = grass[k];
        const bucket = Math.min(10, Math.max(0, Math.round(h * 10)));
        ctx.drawImage(getTileImage(bucket), x * ts, y * ts);
      } else {
        // base grass under the feature (mostly hidden by tile sprite)
        ctx.drawImage(getTileImage(2), x * ts, y * ts);
      }
    }
  }
}

// ---------- Sprites for tile types ----------
function drawTree(x, y) {
  const ts = tileSize;
  const cx = (x + 0.5) * ts, cy = (y + 0.5) * ts;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.beginPath(); ctx.ellipse(cx + 1, cy + ts * 0.38, ts * 0.46, ts * 0.18, 0, 0, Math.PI * 2); ctx.fill();
  // trunk
  ctx.fillStyle = '#5a3a1e';
  roundRect(ctx, cx - ts * 0.09, cy - ts * 0.05, ts * 0.18, ts * 0.46, 2); ctx.fill();
  ctx.fillStyle = '#3e2612';
  ctx.fillRect(cx - ts * 0.03, cy - ts * 0.02, 1.5, ts * 0.44);
  // canopy layers
  const canopy = ctx.createRadialGradient(cx - ts * 0.15, cy - ts * 0.4, 2, cx, cy - ts * 0.2, ts * 0.75);
  canopy.addColorStop(0, '#6cc255');
  canopy.addColorStop(0.5, '#3a8f33');
  canopy.addColorStop(1, '#1f5a23');
  ctx.fillStyle = canopy;
  ctx.beginPath(); ctx.arc(cx - ts * 0.18, cy - ts * 0.18, ts * 0.42, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + ts * 0.22, cy - ts * 0.12, ts * 0.36, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + ts * 0.02, cy - ts * 0.42, ts * 0.38, 0, Math.PI * 2); ctx.fill();
  // highlight tufts
  ctx.fillStyle = 'rgba(180,255,180,0.35)';
  ctx.beginPath(); ctx.arc(cx - ts * 0.25, cy - ts * 0.32, ts * 0.09, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + ts * 0.12, cy - ts * 0.4,  ts * 0.07, 0, Math.PI * 2); ctx.fill();
}

function drawRock(x, y) {
  const ts = tileSize;
  const cx = (x + 0.5) * ts, cy = (y + 0.5) * ts;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(cx, cy + ts * 0.32, ts * 0.38, ts * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  const grad = ctx.createLinearGradient(cx, cy - ts * 0.35, cx, cy + ts * 0.3);
  grad.addColorStop(0, '#b9c0c7');
  grad.addColorStop(0.6, '#7f868c');
  grad.addColorStop(1, '#4a5157');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(cx - ts * 0.38, cy + ts * 0.2);
  ctx.lineTo(cx - ts * 0.28, cy - ts * 0.22);
  ctx.lineTo(cx - ts * 0.08, cy - ts * 0.35);
  ctx.lineTo(cx + ts * 0.18, cy - ts * 0.28);
  ctx.lineTo(cx + ts * 0.36, cy - ts * 0.05);
  ctx.lineTo(cx + ts * 0.32, cy + ts * 0.22);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - ts * 0.22, cy - ts * 0.15);
  ctx.lineTo(cx + ts * 0.06, cy - ts * 0.28);
  ctx.stroke();
}

function drawPond(x, y) {
  const ts = tileSize;
  const cx = (x + 0.5) * ts, cy = (y + 0.5) * ts;
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(cx, cy + 2, ts * 0.48, ts * 0.32, 0, 0, Math.PI * 2); ctx.fill();
  const grad = ctx.createRadialGradient(cx - ts * 0.1, cy - ts * 0.1, 2, cx, cy, ts * 0.5);
  grad.addColorStop(0, '#7ed8ff');
  grad.addColorStop(0.6, '#2aa2dd');
  grad.addColorStop(1, '#155b85');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(cx, cy, ts * 0.46, ts * 0.30, 0, 0, Math.PI * 2); ctx.fill();
  // ripples
  const t = performance.now() / 1000;
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 2; i++) {
    const r = (t * 0.6 + i * 0.5) % 1;
    ctx.globalAlpha = (1 - r) * 0.7;
    ctx.beginPath(); ctx.ellipse(cx, cy, ts * 0.3 * r, ts * 0.2 * r, 0, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawFlower(x, y) {
  const ts = tileSize;
  const cx = (x + 0.5) * ts, cy = (y + 0.5) * ts;
  const palette = FLOWER_PALETTE[flowerColors[idx(x, y)] || 0];
  // grassy base
  ctx.fillStyle = '#3c9042';
  ctx.fillRect(x * ts, y * ts + ts * 0.7, ts, ts * 0.3);
  // 4 flowers with stems
  const positions = [
    [cx - ts * 0.22, cy - ts * 0.1],
    [cx + ts * 0.2, cy - ts * 0.2],
    [cx - ts * 0.05, cy + ts * 0.1],
    [cx + ts * 0.24, cy + ts * 0.18],
  ];
  for (const [fx, fy] of positions) {
    ctx.strokeStyle = '#2a6a2d'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy + ts * 0.3); ctx.stroke();
    // petals
    ctx.fillStyle = palette[0];
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2;
      const px = fx + Math.cos(a) * ts * 0.10;
      const py = fy + Math.sin(a) * ts * 0.10;
      ctx.beginPath(); ctx.arc(px, py, ts * 0.08, 0, Math.PI * 2); ctx.fill();
    }
    // center
    ctx.fillStyle = palette[1];
    ctx.beginPath(); ctx.arc(fx, fy, ts * 0.06, 0, Math.PI * 2); ctx.fill();
  }
}

function drawBeehive(x, y) {
  const ts = tileSize;
  const cx = (x + 0.5) * ts, cy = (y + 0.5) * ts;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(cx, cy + ts * 0.38, ts * 0.38, ts * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  // hive domed body (stacked layers)
  const layers = 4;
  for (let i = 0; i < layers; i++) {
    const yy = cy + ts * 0.32 - (i * ts * 0.16);
    const w = ts * (0.46 - i * 0.06);
    const h = ts * 0.14;
    const grad = ctx.createLinearGradient(0, yy - h, 0, yy + h);
    grad.addColorStop(0, '#ffd26a');
    grad.addColorStop(1, '#c58620');
    ctx.fillStyle = grad;
    roundRect(ctx, cx - w, yy - h, w * 2, h * 2, 4); ctx.fill();
  }
  // entrance
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx, cy + ts * 0.22, ts * 0.08, 0, Math.PI * 2); ctx.fill();
}

function drawFountain(x, y) {
  const ts = tileSize;
  const cx = (x + 0.5) * ts, cy = (y + 0.5) * ts;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(cx, cy + ts * 0.35, ts * 0.45, ts * 0.14, 0, 0, Math.PI * 2); ctx.fill();
  // outer basin
  ctx.fillStyle = '#a1a8ad';
  ctx.beginPath(); ctx.ellipse(cx, cy + ts * 0.15, ts * 0.44, ts * 0.16, 0, 0, Math.PI * 2); ctx.fill();
  // water
  ctx.fillStyle = '#3fb8f0';
  ctx.beginPath(); ctx.ellipse(cx, cy + ts * 0.13, ts * 0.38, ts * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  // pedestal
  ctx.fillStyle = '#c7ced3';
  ctx.fillRect(cx - ts * 0.08, cy - ts * 0.25, ts * 0.16, ts * 0.4);
  ctx.fillStyle = '#d9e0e5';
  ctx.beginPath(); ctx.ellipse(cx, cy - ts * 0.28, ts * 0.2, ts * 0.06, 0, 0, Math.PI * 2); ctx.fill();
  // water spout
  const t = performance.now() / 300;
  ctx.fillStyle = 'rgba(120, 210, 255, 0.9)';
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const r = ts * 0.14 + Math.sin(t + i) * ts * 0.03;
    ctx.beginPath(); ctx.arc(cx + Math.cos(a) * r, cy - ts * 0.35 + Math.abs(Math.sin(a)) * -ts * 0.08, 2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.fillStyle = 'rgba(200, 240, 255, 0.7)';
  ctx.beginPath(); ctx.arc(cx, cy - ts * 0.42, ts * 0.06, 0, Math.PI * 2); ctx.fill();
}

function drawShed(x, y) {
  const ts = tileSize;
  const cx = (x + 0.5) * ts, cy = (y + 0.5) * ts;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(cx, cy + ts * 0.38, ts * 0.4, ts * 0.1, 0, 0, Math.PI * 2); ctx.fill();
  // walls
  ctx.fillStyle = '#9b6a3a';
  ctx.fillRect(cx - ts * 0.35, cy - ts * 0.08, ts * 0.7, ts * 0.44);
  ctx.strokeStyle = '#5a3d1e'; ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    const yy = cy - ts * 0.08 + i * ts * 0.11;
    ctx.beginPath(); ctx.moveTo(cx - ts * 0.35, yy); ctx.lineTo(cx + ts * 0.35, yy); ctx.stroke();
  }
  // roof
  ctx.fillStyle = '#5a2a2a';
  ctx.beginPath();
  ctx.moveTo(cx - ts * 0.45, cy - ts * 0.08);
  ctx.lineTo(cx, cy - ts * 0.4);
  ctx.lineTo(cx + ts * 0.45, cy - ts * 0.08);
  ctx.closePath(); ctx.fill();
  // door
  ctx.fillStyle = '#4a2e14';
  ctx.fillRect(cx - ts * 0.09, cy + ts * 0.06, ts * 0.18, ts * 0.3);
  ctx.fillStyle = '#ffd34e';
  ctx.beginPath(); ctx.arc(cx + ts * 0.06, cy + ts * 0.2, 1.5, 0, Math.PI * 2); ctx.fill();
  // window
  ctx.fillStyle = '#aee4ff';
  ctx.fillRect(cx + ts * 0.14, cy + ts * 0.04, ts * 0.14, ts * 0.12);
}

function drawGnome(x, y) {
  const ts = tileSize;
  const cx = (x + 0.5) * ts, cy = (y + 0.5) * ts;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(cx, cy + ts * 0.36, ts * 0.25, ts * 0.08, 0, 0, Math.PI * 2); ctx.fill();
  // body
  ctx.fillStyle = '#3a82d9';
  ctx.beginPath(); ctx.arc(cx, cy + ts * 0.12, ts * 0.22, 0, Math.PI * 2); ctx.fill();
  // beard
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(cx - ts * 0.18, cy - ts * 0.02);
  ctx.quadraticCurveTo(cx, cy + ts * 0.3, cx + ts * 0.18, cy - ts * 0.02);
  ctx.closePath(); ctx.fill();
  // face
  ctx.fillStyle = '#f4d5b1';
  ctx.beginPath(); ctx.arc(cx, cy - ts * 0.06, ts * 0.1, 0, Math.PI * 2); ctx.fill();
  // hat
  ctx.fillStyle = '#d93a3a';
  ctx.beginPath();
  ctx.moveTo(cx - ts * 0.18, cy - ts * 0.12);
  ctx.lineTo(cx, cy - ts * 0.42);
  ctx.lineTo(cx + ts * 0.18, cy - ts * 0.12);
  ctx.closePath(); ctx.fill();
  // eyes
  ctx.fillStyle = '#222';
  ctx.fillRect(cx - ts * 0.04, cy - ts * 0.07, 1.5, 1.5);
  ctx.fillRect(cx + ts * 0.025, cy - ts * 0.07, 1.5, 1.5);
}

function drawFeatures() {
  for (let y = 0; y < CFG.gridH; y++) {
    for (let x = 0; x < CFG.gridW; x++) {
      const k = idx(x, y);
      const t = tiles[k];
      if (t === T.GRASS) continue;
      switch (t) {
        case T.TREE:     drawTree(x, y); break;
        case T.ROCK:     drawRock(x, y); break;
        case T.POND:     drawPond(x, y); break;
        case T.FLOWER:   drawFlower(x, y); break;
        case T.BEEHIVE:  drawBeehive(x, y); break;
        case T.FOUNTAIN: drawFountain(x, y); break;
        case T.SHED:     drawShed(x, y); break;
        case T.GNOME:    drawGnome(x, y); break;
      }
    }
  }
}

function drawBee(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 5, 5, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  // wings (behind body)
  const wingY = Math.sin(b.wingPhase) * 1.2;
  ctx.fillStyle = 'rgba(230,240,255,0.75)';
  ctx.beginPath(); ctx.ellipse(-1, -3 + wingY * 0.2, 4, 2, -0.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-1,  3 - wingY * 0.2, 4, 2,  0.4, 0, Math.PI * 2); ctx.fill();
  // body
  ctx.fillStyle = '#ffcf3a';
  ctx.beginPath(); ctx.ellipse(0, 0, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
  // stripes
  ctx.fillStyle = '#222';
  ctx.fillRect(-2, -3, 1.2, 6);
  ctx.fillRect( 1, -3, 1.2, 6);
  // head
  ctx.fillStyle = '#1c1c1c';
  ctx.beginPath(); ctx.arc(3.2, 0, 1.6, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawRobot(r) {
  ctx.save();
  ctx.translate(r.x, r.y + Math.sin(r.bob) * 0.6);
  ctx.rotate(r.angle);

  const s = Math.max(10, tileSize * 0.9);
  const w = s * 1.4, h = s;

  // mow radius glow
  const rad = mowRadius();
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, rad);
  grad.addColorStop(0, 'rgba(255, 230, 130, 0.20)');
  grad.addColorStop(0.7, 'rgba(255, 230, 130, 0.06)');
  grad.addColorStop(1, 'rgba(255, 230, 130, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, rad, 0, Math.PI * 2);
  ctx.fill();

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0, h * 0.45, w * 0.55, h * 0.22, 0, 0, Math.PI * 2); ctx.fill();

  // body
  const bodyGrad = ctx.createLinearGradient(0, -h/2, 0, h/2);
  bodyGrad.addColorStop(0, '#ff7a2e');
  bodyGrad.addColorStop(1, '#c0421a');
  ctx.fillStyle = bodyGrad;
  roundRect(ctx, -w/2, -h/2, w, h, s * 0.24);
  ctx.fill();

  // chassis highlight
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  roundRect(ctx, -w/2 + 2, -h/2 + 2, w - 4, h * 0.28, s * 0.18);
  ctx.fill();

  // front panel / sensor
  ctx.fillStyle = '#1a1a1a';
  roundRect(ctx, w/2 - s*0.35, -h*0.22, s*0.30, h*0.44, s*0.08);
  ctx.fill();
  // "eyes" / sensor lights
  ctx.fillStyle = '#58ffa0';
  ctx.fillRect(w/2 - s*0.22, -h*0.12, s*0.06, s*0.08);
  ctx.fillRect(w/2 - s*0.22, h*0.04,  s*0.06, s*0.08);

  // wheels
  ctx.fillStyle = '#111';
  roundRect(ctx, -w*0.38, -h*0.62, w*0.22, h*0.22, s*0.08); ctx.fill();
  roundRect(ctx, -w*0.38,  h*0.40, w*0.22, h*0.22, s*0.08); ctx.fill();
  roundRect(ctx,  w*0.18, -h*0.62, w*0.22, h*0.22, s*0.08); ctx.fill();
  roundRect(ctx,  w*0.18,  h*0.40, w*0.22, h*0.22, s*0.08); ctx.fill();

  // rotating blade indicator (small disc on top)
  ctx.save();
  ctx.rotate(r.bladePhase);
  ctx.fillStyle = 'rgba(220,220,220,0.9)';
  ctx.beginPath(); ctx.arc(0, 0, s*0.26, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    ctx.save(); ctx.rotate(i * Math.PI / 2);
    ctx.fillStyle = '#7a7a7a';
    ctx.fillRect(-s*0.22, -1, s*0.44, 2);
    ctx.restore();
  }
  ctx.restore();

  // antenna
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-w*0.25, 0); ctx.lineTo(-w*0.25, -h*0.7); ctx.stroke();
  ctx.fillStyle = '#ff4a4a';
  ctx.beginPath(); ctx.arc(-w*0.25, -h*0.72, 2, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawParticles(dt) {
  ctx.save();
  ctx.font = 'bold 14px Inter, sans-serif';
  ctx.textAlign = 'center';
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt * 0.8;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
    ctx.fillStyle = p.color;
    ctx.font = `bold ${p.size}px Inter, sans-serif`;
    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
    ctx.lineWidth = 3;
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrass();
  // mowed-stripe overlay for that freshly-cut lawn look
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let x = 0; x < CFG.gridW; x += 2) {
    ctx.fillRect(x * tileSize, 0, tileSize, canvas.height);
  }
  drawFeatures();
  for (const r of robots) drawRobot(r);
  for (const b of bees) drawBee(b);
  drawParticles(1/60);
}

// ---------- Main loop ----------
let lastFrame = performance.now();
let accumulator = 0;
const TICK = 1 / 60;

function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min(0.1, (now - lastFrame) / 1000);
  lastFrame = now;
  accumulator += dt;
  while (accumulator >= TICK) {
    updateGrass(TICK);
    updateFlowerIncome(TICK);
    for (const r of robots) updateRobot(r, TICK);
    for (const b of bees) updateBee(b, TICK);
    accumulator -= TICK;
  }
  render();
  updateHUD();
}

// ---------- HUD ----------
let lastCoinDisplay = 0;
let lastRateSample = { t: performance.now(), coins: 0 };
let displayedRate = 0;
function updateHUD() {
  const coinAmt = document.getElementById('coinAmt');
  const newVal = formatShort(state.coins);
  if (coinAmt.textContent !== newVal) {
    coinAmt.textContent = newVal;
    if (state.coins - lastCoinDisplay > 0.0001) flashCoin();
    lastCoinDisplay = state.coins;
  }
  document.getElementById('gemAmt').textContent = formatShort(state.gems);
  document.getElementById('gemBonus').textContent = `+${(state.gems * 10)}% bonus`;

  // compute rate
  const now = performance.now();
  if (now - lastRateSample.t > 700) {
    const dt = (now - lastRateSample.t) / 1000;
    const earned = state.totalEarnedAllTime - lastRateSample.coins;
    const rate = earned / dt;
    displayedRate = displayedRate * 0.7 + rate * 0.3;
    lastRateSample.t = now; lastRateSample.coins = state.totalEarnedAllTime;
    document.getElementById('coinRate').textContent = `+${formatShort(displayedRate)} / sec`;
  }

  document.getElementById('hudRobots').textContent = state.upgrades.robots;
  let total = 0, count = 0;
  for (let i = 0; i < grass.length; i++) {
    if (tiles[i] === T.GRASS) { total += grass[i]; count++; }
  }
  const pct = count > 0 ? Math.round(total / count * 100) : 0;
  document.getElementById('hudGrass').textContent = pct + '%';
  document.getElementById('hudFlowers').textContent = state.garden.flower;
  document.getElementById('hudBees').textContent = bees.length;
  document.getElementById('hudTotal').textContent = formatShort(state.totalTilesMowed);
}

// ---------- Formatting ----------
const SUFFIX = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc'];
function formatShort(n) {
  if (!isFinite(n)) return '∞';
  if (n < 1000) return (n | 0).toString();
  let i = 0;
  while (n >= 1000 && i < SUFFIX.length - 1) { n /= 1000; i++; }
  return n.toFixed(n < 10 ? 2 : n < 100 ? 1 : 0) + SUFFIX[i];
}

let activeTab = 'upgrades';
function renderShop() {
  const list = document.getElementById('shopList');
  list.innerHTML = '';

  if (activeTab === 'prestige') { renderPrestige(list); return; }
  if (activeTab === 'garden')   { renderGarden(list);   return; }

  for (const up of UPGRADE_DEFS) {
    if (up.show && !up.show()) continue;
    const lvl = state.upgrades[up.key];
    const maxed = lvl >= MAX[up.key];
    const cost = maxed ? Infinity : COST[up.key](lvl);
    const affordable = state.coins >= cost && !maxed;
    const row = document.createElement('div');
    row.className = 'upgrade' + (affordable ? ' affordable' : '');
    row.innerHTML = `
      <div class="icon">${up.icon}</div>
      <div class="info">
        <div class="name">${up.name} ${up.key !== 'robots' ? `<span class="lvl">Lv ${lvl}</span>` : ''}</div>
        <div class="lvl">${up.desc(state)}</div>
        <div class="effect">${maxed ? '⭐ MAXED' : up.effect(state)}</div>
      </div>
      <button class="buy" ${affordable ? '' : 'disabled'}>
        ${maxed ? 'MAX' : 'Buy'}
        <span class="cost">${maxed ? '—' : '💰 ' + formatShort(cost)}</span>
      </button>
    `;
    row.querySelector('.buy').addEventListener('click', () => buy(up.key));
    list.appendChild(row);
  }
}

function renderGarden(list) {
  const header = document.createElement('div');
  header.innerHTML = `
    <p style="font-size:12px; color:var(--ink-dim); margin-bottom:10px; line-height:1.4;">
      Build your dream garden. Placements auto-drop on random grass.<br>
      <b style="color:var(--grass-xlight);">Bonuses stack.</b> 🌸 flowers feed 🐝 bees.
    </p>`;
  list.appendChild(header);
  for (const def of GARDEN_DEFS) {
    const owned = state.garden[def.key];
    const maxed = owned >= def.max;
    const cost = maxed ? Infinity : gardenCost(def.key);
    const affordable = state.coins >= cost && !maxed;
    const row = document.createElement('div');
    row.className = 'upgrade' + (affordable ? ' affordable' : '');
    row.innerHTML = `
      <div class="icon">${def.icon}</div>
      <div class="info">
        <div class="name">${def.name} <span class="lvl">× ${owned}/${def.max}</span></div>
        <div class="effect">${def.desc()}</div>
      </div>
      <button class="buy" ${affordable ? '' : 'disabled'}>
        ${maxed ? 'MAX' : 'Place'}
        <span class="cost">${maxed ? '—' : '💰 ' + formatShort(cost)}</span>
      </button>
    `;
    row.querySelector('.buy').addEventListener('click', () => buyGarden(def.key));
    list.appendChild(row);
  }
}

function buyGarden(key) {
  const def = GARDEN_BY_KEY[key];
  const owned = state.garden[key];
  if (owned >= def.max) return;
  const cost = gardenCost(key);
  if (state.coins < cost) return;
  const placed = placeAtRandomGrass(def.type);
  if (!placed) {
    toast('⚠️ No free grass tile found!', '#ffb4b4');
    return;
  }
  state.coins -= cost;
  state.garden[key] = owned + 1;
  beep(500 + owned * 15, 0.08, 'sine', 0.07);
  if (key === 'beehive') {
    ensureBeesFromHives();
    toast('🐝 Beehive placed! Bees deployed.', '#ffd34e');
  } else {
    addParticle((placed.x + 0.5) * tileSize, (placed.y + 0.5) * tileSize, {
      text: '+' + def.icon, color: '#8ff09e', size: 18,
    });
  }
  renderShop();
  saveGame();
}

function renderPrestige(list) {

  const wrap = document.createElement('div');

  wrap.innerHTML = `

    Each gem grants <b>+10% coin bonus</b>, forever.</p>
    <div class="gain">💎 +${gain} gems</div>
    <p style="font-size:11px; opacity:0.7;">Threshold: ${formatShort(CFG.prestigeThreshold)} coins earned this run<br>
    Earned this run: ${formatShort(state.totalEarnedThisRun)}</p>
    <button id="prestigeBtn" ${can && gain > 0 ? '' : 'disabled'}>Fertilize (+${gain} 💎)</button>
  `;
  list.appendChild(wrap);
  const btn = wrap.querySelector('#prestigeBtn');
  if (btn) btn.addEventListener('click', doPrestige);

  const info = document.createElement('div');
  info.className = 'upgrade';
  info.style.gridTemplateColumns = '42px 1fr';
  info.innerHTML = `
    <div class="icon">💎</div>
    <div class="info">
      <div class="name">Current Gems: ${state.gems}</div>
      <div class="effect">Global bonus: +${(state.gems * 10)}% to all coin income</div>
    </div>
  `;
  list.appendChild(info);
}

function buy(key) {
  const lvl = state.upgrades[key];
  if (lvl >= MAX[key]) return;
  const cost = COST[key](lvl);
  if (state.coins < cost) return;
  state.coins -= cost;
  state.upgrades[key] = lvl + 1;
  if (key === 'robots') {
    ensureRobotCount();
    addParticle(canvas.width / 2, canvas.height / 2, { text: 'NEW ROBOT!', color: '#8ff09e', size: 18 });
  }
  beep(660 + lvl * 10, 0.08, 'square', 0.08);
  renderShop();
  saveGame();
}

function doPrestige() {
  const gain = CFG.prestigeFormula(state.totalEarnedThisRun);
  if (gain <= 0) return;
  if (!confirm(`Fertilize? You will gain ${gain} 💎 gems (permanent +${gain * 10}% bonus), but reset coins, robots, upgrades and garden.`)) return;
  state.gems += gain;
  state.coins = 0;
  state.totalEarnedThisRun = 0;
  state.upgrades = { robots: 1, speed: 0, range: 0, value: 0, growth: 0, rate: 0, crit: 0 };
  state.garden  = { tree: 0, rock: 0, pond: 0, flower: 0, beehive: 0, fountain: 0, shed: 0, gnome: 0 };
  robots = [];
  bees = [];
  initWorld();
  ensureRobotCount();
  ensureBeesFromHives();
  toast(`🌟 Gained ${gain} 💎 Gems!`, '#8ff09e');
  beep(880, 0.15, 'triangle', 0.12);
  setTimeout(() => beep(1320, 0.2, 'triangle', 0.1), 100);
  renderShop();
  saveGame();
}

// ---------- Toasts ----------
function toast(msg, color = '#ffd34e') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = `linear-gradient(180deg, ${color}ee, ${color}aa)`;
  t.innerHTML = `<span class="t-ico">🏆</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

// ---------- Save / Load ----------
const SAVE_KEY = 'lawnbotTycoonSave_v2';
let lastSave = 0;
function saveGame() {
  // Pack non-grass tiles as [type, x, y, color?] triplets to keep save small
  const tilePack = [];
  if (tiles) {
    for (let y = 0; y < CFG.gridH; y++) {
      for (let x = 0; x < CFG.gridW; x++) {
        const t = tiles[idx(x, y)];
        if (t !== T.GRASS) {
          const entry = [t, x, y];
          if (t === T.FLOWER) entry.push(flowerColors[idx(x, y)] || 0);
          tilePack.push(entry);
        }
      }
    }
  }
  const payload = {
    state: {
      coins: state.coins,
      gems: state.gems,
      totalEarnedAllTime: state.totalEarnedAllTime,
      totalEarnedThisRun: state.totalEarnedThisRun,
      totalTilesMowed: state.totalTilesMowed,
      muted: state.muted,
      upgrades: state.upgrades,
      garden: state.garden,
    },
    tiles: tilePack,
    ts: Date.now(),
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(payload)); } catch(e) {}
  lastSave = performance.now();
  const s = document.getElementById('saveStatus');
  if (s) s.textContent = '💾 Saved ' + new Date().toLocaleTimeString();
}
function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    Object.assign(state, data.state);
    // Ensure shape (old saves may miss garden key)
    state.garden = Object.assign({ tree: 0, rock: 0, pond: 0, flower: 0, beehive: 0, fountain: 0, shed: 0, gnome: 0 }, state.garden || {});
    // Recreate world with fresh grass, then apply saved tile placements
    grass = new Float32Array(CFG.gridW * CFG.gridH);
    tiles = new Uint8Array(CFG.gridW * CFG.gridH);
    flowerColors = new Uint8Array(CFG.gridW * CFG.gridH);
    for (let i = 0; i < grass.length; i++) grass[i] = 0.7 + Math.random() * 0.3;
    if (Array.isArray(data.tiles)) {
      for (const entry of data.tiles) {
        const [t, x, y, col] = entry;
        if (!inBounds(x, y)) continue;
        tiles[idx(x, y)] = t;
        grass[idx(x, y)] = 0;
        if (t === T.FLOWER) flowerColors[idx(x, y)] = col || 0;
      }
    }
    // Offline earnings
    const elapsed = Math.min(12 * 3600, (Date.now() - data.ts) / 1000);
    if (elapsed > 10) {
      const ts = 16;
      const tilesPerSec = state.upgrades.robots * mowRate() * Math.PI * Math.pow(mowRadius()/ts, 2) * 0.25;
      const mowOffline = Math.floor(tilesPerSec * CFG.coinPerUnitBase * coinMult() * elapsed * 0.5);
      const flowerOffline = Math.floor(state.garden.flower * CFG.flowerCoinPerSec * coinMult() * elapsed);
      const beeOffline = Math.floor(state.garden.beehive * CFG.beePerHive * (CFG.beeRewardPerVisit / (CFG.beeVisitDuration + 0.5)) * coinMult() * elapsed * 0.6);
      const offlineCoins = mowOffline + flowerOffline + beeOffline;
      if (offlineCoins > 0) {
        state.coins += offlineCoins;
        state.totalEarnedAllTime += offlineCoins;
        state.totalEarnedThisRun += offlineCoins;
        showOfflineModal(offlineCoins, elapsed);
      }
    }
    return true;
  } catch(e) { console.warn('Failed to load save', e); return false; }
}
function resetGame() {
  if (!confirm('⚠️ Reset ALL progress including gems? This cannot be undone.')) return;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

function showOfflineModal(coins, seconds) {
  const hours = (seconds / 3600);
  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  back.innerHTML = `
    <div class="modal">
      <h2>🌞 WELCOME BACK!</h2>
      <p>Your robots were busy while you were away for <b>${hours.toFixed(1)} hour${hours >= 1.5 ? 's' : ''}</b>.</p>
      <div class="big">+💰 ${formatShort(coins)}</div>
      <p>They never stop. The grass never wins.</p>
      <button id="okBtn">Awesome!</button>
    </div>`;
  document.body.appendChild(back);
  back.querySelector('#okBtn').addEventListener('click', () => back.remove());
}

// ---------- Achievements (milestones) ----------
const ACHIEVEMENTS = [
  { id: 'first',  cond: s => s.totalEarnedAllTime >= 100,   msg: 'Rookie Mower: earned 100 coins' },
  { id: 'k1',     cond: s => s.totalEarnedAllTime >= 1000,  msg: 'Green Thumb: earned 1K coins' },
  { id: 'k10',    cond: s => s.totalEarnedAllTime >= 10000, msg: 'Lawn Baron: earned 10K coins' },
  { id: 'k100',   cond: s => s.totalEarnedAllTime >= 1e5,   msg: 'Grass Tycoon: earned 100K coins' },
  { id: 'm1',     cond: s => s.totalEarnedAllTime >= 1e6,   msg: 'Turf Millionaire!' },
  { id: 'robot5', cond: s => s.upgrades.robots >= 5,        msg: '5-Bot Fleet assembled' },
  { id: 'robot15',cond: s => s.upgrades.robots >= 15,       msg: '15-Bot Army deployed' },
  { id: 'gems1',  cond: s => s.gems >= 1,                   msg: 'First Fertilization: +10% forever' },
];
const achieved = new Set();
function checkAchievements() {
  for (const a of ACHIEVEMENTS) {
    if (!achieved.has(a.id) && a.cond(state)) {
      achieved.add(a.id);
      toast('🏆 ' + a.msg, '#ffd34e');
      beep(1200, 0.1, 'triangle', 0.08);
    }
  }
}

// ---------- Tabs ----------
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    renderShop();
  });
});

// ---------- Footer buttons ----------
document.getElementById('saveBtn').addEventListener('click', () => { saveGame(); toast('💾 Game saved!', '#8ff09e'); });
document.getElementById('resetBtn').addEventListener('click', resetGame);
const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', () => {
  state.muted = !state.muted;
  muteBtn.textContent = state.muted ? '🔇 Muted' : '🔊 Sound';
  saveGame();
});

// ---------- Init ----------
function init() {
  const loaded = loadGame();
  resizeCanvas();
  if (!loaded) initWorld();
  ensureRobotCount();
  ensureBeesFromHives();
  muteBtn.textContent = state.muted ? '🔇 Muted' : '🔊 Sound';
  renderShop();
  setInterval(() => { renderShop(); checkAchievements(); }, 500);
  setInterval(saveGame, 5000);
  window.addEventListener('beforeunload', saveGame);
  document.addEventListener('visibilitychange', () => { if (document.hidden) saveGame(); });
  if (!localStorage.getItem(SAVE_KEY)) {
    setTimeout(() => toast('🤖 Welcome, CEO! Let the mowing begin.', '#8ff09e'), 300);
  }
  requestAnimationFrame(loop);
}

init();
</script>
